# .github/workflows/ci.yml
name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    name: Train Model & Build Docker
    runs-on: ubuntu-latest
    
    # Izin tetap dipertahankan untuk keamanan akses
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn

      - name: Run preprocessing
        run: |
          python preprocessing/automate_ArjunaMelixSihombing.py

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . \
            --env-manager local \
            -P n_estimators=100 \
            -P max_depth=10 \
            -P min_samples_split=5 \
            -P min_samples_leaf=2 \
            -P data_dir=../heart_disease_preprocessing

      # Step 7: Simpan artefak ke fitur Artifacts GitHub (Aman & Tidak error Git)
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: MLProject/mlruns/
          retention-days: 30

      # Step 8: DIHAPUS agar tidak ada konflik git push
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image with MLflow
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "mlruns/0/$(ls mlruns/0/ | grep -v 'meta.yaml' | head -1)/artifacts/model" \
            --name "${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest" \
            --enable-mlserver

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest
          echo "✅ Docker image berhasil di-push ke Docker Hub!"
