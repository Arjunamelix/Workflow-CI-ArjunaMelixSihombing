# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────
# GitHub Actions — MLflow CI Pipeline (Kriteria 3 Advance)
# Trigger: push ke main ATAU manual
# Alur:
#   1. Setup environment
#   2. Jalankan preprocessing
#   3. Jalankan MLflow Project (training)
#   4. Simpan artefak ke GitHub
#   5. Build & push Docker image ke Docker Hub
# ─────────────────────────────────────────────────────────────────

name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    name: Train Model & Build Docker
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependensi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn

      # 4. Jalankan preprocessing (hasilkan dataset siap latih)
      - name: Run preprocessing
        run: |
          python preprocessing/automate_ArjunaMelixSihombing.py

      # 5. Jalankan MLflow Project (training)
      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . \
            --env-manager local \
            -P n_estimators=100 \
            -P max_depth=10 \
            -P min_samples_split=5 \
            -P min_samples_leaf=2 \
            -P data_dir=heart_disease_preprocessing

      # 6. Tampilkan isi mlruns untuk verifikasi
      - name: Show MLflow artifacts
        run: |
          echo "=== Isi mlruns ==="
          find MLProject/mlruns -type f | head -30

      # 7. Upload artefak ke GitHub (sebagai GitHub Actions Artifact)
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: MLProject/mlruns/
          retention-days: 30

      # 8. Commit mlruns ke repository (Skilled)
      - name: Commit mlruns to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns/
          git diff --staged --quiet || \
            git commit -m "chore: update mlruns artifacts [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Setup Docker Buildx (Advance)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 10. Login ke Docker Hub (Advance)
      #     Tambahkan secrets: DOCKER_USERNAME dan DOCKER_PASSWORD di repo GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 11. Build Docker image menggunakan mlflow build-docker (Advance)
      - name: Build Docker image with MLflow
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "mlruns/0/$(ls mlruns/0/ | grep -v 'meta.yaml' | head -1)/artifacts/model" \
            --name "${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest" \
            --enable-mlserver

      # 12. Push Docker image ke Docker Hub (Advance)
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest
          echo "✅ Docker image berhasil di-push ke Docker Hub!"
          echo "   Image: ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest"
