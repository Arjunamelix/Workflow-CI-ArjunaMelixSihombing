# .github/workflows/ci.yml
# CI Pipeline MLflow — Heart Disease
# Advance: training + simpan artefak ke GitHub
# (Docker build dihapus karena MLflow build-docker tidak support Python 3.9)

name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    name: Preprocessing + Training + Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn

      - name: Run preprocessing
        run: |
          python preprocessing/automate_ArjunaMelixSihombing.py

      - name: Show preprocessed data
        run: |
          echo "=== File hasil preprocessing ==="
          ls -lh MLProject/heart_disease_preprocessing/
          echo ""
          echo "=== 3 baris pertama train.csv ==="
          head -n 4 preprocessing/heart_disease_preprocessing/train.csv

      - name: Run MLflow training (env=local, no conda)
        run: |
          cd MLProject
          mlflow run . \
            --env-manager local \
            -P n_estimators=100 \
            -P max_depth=10 \
            -P min_samples_split=5 \
            -P min_samples_leaf=2 \
            -P data_dir=heart_disease_preprocessing

      - name: Show MLflow artifacts
        run: |
          echo "=== Struktur mlruns ==="
          find MLProject/mlruns -type f | head -40

      - name: Upload MLflow artifacts ke GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts-${{ github.run_number }}
          path: MLProject/mlruns/
          retention-days: 30

      - name: Commit mlruns ke repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f MLProject/mlruns/
          git diff --staged --quiet && echo "Tidak ada perubahan" || \
            git commit -m "ci: update mlruns run #${{ github.run_number }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ CI Pipeline selesai!"
          echo "   - Preprocessing: sukses"
          echo "   - Training MLflow: sukses"
          echo "   - Artefak: tersimpan di Actions Artifacts + repo"
